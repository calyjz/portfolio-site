{% extends "base.html" %}

{% block content %}

<div class="timeline-page-container">
    <div class="title-header">
        <h3>━━ Timeline</h3>
    </div>

    <form id="timeline-form" class="post-form">
        <div class="post-form-row">
            <div class="post-form-group">
                <label for="post-name">Name</label>
                <input type="text" id="post-name" name="name" required>
            </div>
            <div class="post-form-group">
                <label for="post-email">Email</label>
                <input type="email" id="post-email" name="email" required>
            </div>
        </div>
        <div class="post-form-group">
            <label for="post-content">What's on your mind?</label>
            <textarea id="post-content" name="content" rows="3" required></textarea>
        </div>
        <button type="submit" class="post-submit-btn">Post</button>
        <p id="post-form-error" class="post-form-error"></p>
    </form>

    <ul id="post-list" class="post-list"></ul>
</div>

<script>
    const form = document.getElementById('timeline-form');
    const postList = document.getElementById('post-list');
    const formError = document.getElementById('post-form-error');

    function formatDate(dateStr) {
        const date = new Date(dateStr);
        if (isNaN(date)) return dateStr;
        return date.toLocaleString(undefined, {
            dateStyle: 'medium',
            timeStyle: 'short'
        });
    }

    function renderPost(post) {
        const li = document.createElement('li');
        li.className = 'post-card';
        li.innerHTML = `
            <div class="post-card-header">
                <span class="post-card-name">${post.name}</span>
                <span class="post-card-date">${formatDate(post.created_at)}</span>
            </div>
            <p class="post-card-content"></p>
        `;
        li.querySelector('.post-card-content').textContent = post.content;
        return li;
    }

    function renderPosts(posts) {
        postList.innerHTML = '';
        posts.forEach(post => postList.appendChild(renderPost(post)));
    }

    async function loadPosts() {
        try {
            const res = await fetch('/api/timeline_post');
            const data = await res.json();
            renderPosts(data.timeline_posts);
        } catch (err) {
            console.error('Failed to load timeline posts', err);
        }
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        formError.textContent = '';

        const formData = new FormData(form);

        try {
            const res = await fetch('/api/timeline_post', {
                method: 'POST',
                body: formData
            });

            if (!res.ok) {
                throw new Error('Request failed');
            }

            const newPost = await res.json();
            postList.prepend(renderPost(newPost));
            form.reset();
        } catch (err) {
            formError.textContent = 'Something went wrong posting your update. Please try again.';
            console.error('Failed to submit timeline post', err);
        }
    });

    loadPosts();
</script>

{% endblock %}
