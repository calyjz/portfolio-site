<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta property="og:url" content="{{ url }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="/static/styles/main.css">
    <link rel="icon" href="/static/img/favicon.ico" type="image/x-icon">
    <title>{{ title }}</title>
</head>

<body>

    <!-- Navigation Dock -->
    <div class="dock-container">
        <nav class="dock">
            {% for page in nav_pages %}
            <a href="{{ page.url }}" class="dock-icon" data-tooltip="{{ page.name }}">
                <i class="{{ page.icon }}"></i>
            </a>
            {% endfor %}
            <div class="dock-separator"></div>
            <a href="https://github.com/calyjz" class="dock-icon" data-tooltip="GitHub" target="_blank">
                <i class="fa-brands fa-github"></i>
            </a>
            <a href="https://www.linkedin.com/in/calyzheng/" class="dock-icon" data-tooltip="LinkedIn" target="_blank">
                <i class="fa-brands fa-linkedin"></i>
            </a>
        </nav>
    </div>

    {% block content %}{% endblock %}


</body>
</html>
