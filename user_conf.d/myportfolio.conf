limit_req_zone $binary_remote_addr zone=timeline_post_limit:10m rate=1r/m;

server {
    listen 80;
    server_name calyz.duckdns.org;

    if ($host = calyz.duckdns.org) {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name calyz.duckdns.org;

    location /api/timeline_post {
        limit_req zone=timeline_post_limit;
        proxy_pass http://myportfolio:5000/api/timeline_post;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        limit_req_status 429;
    }

    location / {
        proxy_pass http://myportfolio:5000/;
    }

    #load the certificate files
    ssl_certificate /etc/letsencrypt/live/calyz.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/calyz.duckdns.org/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/calyz.duckdns.org/chain.pem;
}